name: SBOM

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write  # required by `gh release upload` on release events

env:
  DOTNET_SDK_VERSION: "10.0.x"
  SOLUTION_PATH: Earmark.slnx
  BOM_FILE: sbom.cdx.json
  # NOTE: GitHub Actions does not allow expressions in `uses:` refs, so pipeline-tools
  # is pinned in each `uses:` line below. Bump every reference in lockstep.
  # Current pin: 413aae3cf5866cd943582e41042f0e06a42a764a (hoobio/pipeline-tools, 2026-04-26).

jobs:
  sbom:
    name: SBOM
    runs-on: windows-latest
    env:
      DT_HOST: ${{ secrets.DT_HOST }}
      DT_API_KEY: ${{ secrets.DT_API_KEY }}
      IS_RELEASE: ${{ github.event_name == 'release' }}
      REF_TAG_PREFIX: ${{ github.event_name == 'release' && 'tag' || 'branch' }}
      # Child project version: release tag for releases, commit SHA otherwise.
      PROJECT_VERSION: ${{ github.event_name == 'release' && github.ref_name || github.sha }}
      # Parent project version: 'release' umbrella for releases, 'main' for branch builds.
      PARENT_VERSION: ${{ github.event_name == 'release' && 'release' || 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK ${{ env.DOTNET_SDK_VERSION }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Generate CycloneDX SBOM
        uses: hoobio/pipeline-tools/pipeline/github/step/cyclonedx-sbom-dotnet@413aae3cf5866cd943582e41042f0e06a42a764a
        with:
          solution-path: ${{ env.SOLUTION_PATH }}
          output-path: ${{ env.BOM_FILE }}

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: sbom-cyclonedx-${{ env.PROJECT_VERSION }}
          path: ${{ env.BOM_FILE }}
          if-no-files-found: error

      - name: Attach SBOM to GitHub Release
        if: env.IS_RELEASE == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ env.BOM_FILE }}" --clobber --repo "${{ github.repository }}"

      - name: Ensure Dependency-Track parent project exists
        if: env.DT_HOST != '' && env.DT_API_KEY != ''
        uses: hoobio/pipeline-tools/pipeline/github/step/dt-init-parent@413aae3cf5866cd943582e41042f0e06a42a764a
        with:
          server-url: https://${{ env.DT_HOST }}
          api-key: ${{ env.DT_API_KEY }}
          project-name: ${{ github.event.repository.name }}
          project-version: ${{ env.PARENT_VERSION }}
          bom-path: ${{ env.BOM_FILE }}

      - name: Upload SBOM to Dependency-Track
        if: env.DT_HOST != '' && env.DT_API_KEY != ''
        uses: hoobio/pipeline-tools/pipeline/github/step/dt-upload-bom@413aae3cf5866cd943582e41042f0e06a42a764a
        with:
          server-url: https://${{ env.DT_HOST }}
          api-key: ${{ env.DT_API_KEY }}
          project-name: ${{ github.event.repository.name }}
          project-version: ${{ env.PROJECT_VERSION }}
          bom-path: ${{ env.BOM_FILE }}
          parent-name: ${{ github.event.repository.name }}
          parent-version: ${{ env.PARENT_VERSION }}
          project-tags: ${{ env.REF_TAG_PREFIX }}=${{ github.ref_name }},repo=${{ github.repository }},commit=${{ github.sha }},run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Mark Dependency-Track project as latest
        if: env.IS_RELEASE == 'true' && env.DT_HOST != '' && env.DT_API_KEY != ''
        uses: hoobio/pipeline-tools/pipeline/github/step/dt-mark-latest@413aae3cf5866cd943582e41042f0e06a42a764a
        with:
          server-url: https://${{ env.DT_HOST }}
          api-key: ${{ env.DT_API_KEY }}
          project-name: ${{ github.event.repository.name }}
          project-version: ${{ env.PROJECT_VERSION }}

      - name: Prune old commit children under main parent
        if: env.IS_RELEASE != 'true' && env.DT_HOST != '' && env.DT_API_KEY != ''
        uses: hoobio/pipeline-tools/pipeline/github/step/dt-prune-stale-children@413aae3cf5866cd943582e41042f0e06a42a764a
        with:
          server-url: https://${{ env.DT_HOST }}
          api-key: ${{ env.DT_API_KEY }}
          parent-name: ${{ github.event.repository.name }}
          parent-version: ${{ env.PARENT_VERSION }}
          keep: ${{ github.event_name == 'workflow_dispatch' && '1' || '10' }}

      - name: Skip notice if Dependency-Track secrets not configured
        if: env.DT_HOST == '' || env.DT_API_KEY == ''
        shell: bash
        run: echo "::warning::DT_HOST or DT_API_KEY secret not set; skipping Dependency-Track upload."
