name: SBOM

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write  # required for the GitHub Release attach on release events

env:
  DOTNET_SDK_VERSION: "10.0.x"
  SOLUTION_PATH: Earmark.slnx
  BOM_FILE: sbom.cdx.json

jobs:
  sbom:
    name: SBOM
    runs-on: windows-latest
    env:
      DT_HOST: ${{ secrets.DT_HOST }}
      DT_API_KEY: ${{ secrets.DT_API_KEY }}
      IS_RELEASE: ${{ github.event_name == 'release' }}
      REF_TAG_PREFIX: ${{ github.event_name == 'release' && 'tag' || 'branch' }}
      # Child project version: release tag for releases, commit SHA otherwise.
      PROJECT_VERSION: ${{ github.event_name == 'release' && github.ref_name || github.sha }}
      # Parent project version: 'release' umbrella for releases, 'main' for branch builds.
      PARENT_VERSION: ${{ github.event_name == 'release' && 'release' || 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK ${{ env.DOTNET_SDK_VERSION }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Generate CycloneDX SBOM
        uses: hoobio/pipeline-tools/pipeline/github/step/cyclonedx-sbom-dotnet@v1.0.0
        with:
          solution-path: ${{ env.SOLUTION_PATH }}
          output-path: ${{ env.BOM_FILE }}

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx-${{ env.PROJECT_VERSION }}
          path: ${{ env.BOM_FILE }}
          if-no-files-found: error

      - name: Attach SBOM to GitHub Release
        if: env.IS_RELEASE == 'true'
        uses: hoobio/pipeline-tools/pipeline/github/step/upload-to-github-release@v1.0.0
        with:
          tag: ${{ github.event.release.tag_name }}
          file-path: ${{ env.BOM_FILE }}

      - name: Upload SBOM to Dependency-Track
        if: env.DT_HOST != '' && env.DT_API_KEY != ''
        uses: hoobio/pipeline-tools/pipeline/github/job/upload-sbom-to-dependency-track@v1.0.0
        with:
          bom-path: ${{ env.BOM_FILE }}
          upload-artifact: 'false'                          # already uploaded above
          server-url: https://${{ env.DT_HOST }}
          api-key: ${{ env.DT_API_KEY }}
          project-name: ${{ github.event.repository.name }}
          project-version: ${{ env.PROJECT_VERSION }}
          project-tags: ${{ env.REF_TAG_PREFIX }}=${{ github.ref_name }},repo=${{ github.repository }},commit=${{ github.sha }},run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          parent-name: ${{ github.event.repository.name }}
          parent-version: ${{ env.PARENT_VERSION }}
          mark-latest: ${{ env.IS_RELEASE }}
          prune-stale-children: ${{ env.IS_RELEASE != 'true' }}
          keep: ${{ github.event_name == 'workflow_dispatch' && '1' || '10' }}

      - name: Skip notice if Dependency-Track secrets not configured
        if: env.DT_HOST == '' || env.DT_API_KEY == ''
        shell: bash
        run: echo "::warning::DT_HOST or DT_API_KEY secret not set; skipping Dependency-Track upload."
