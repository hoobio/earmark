name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Generate release-please app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: googleapis/release-please-action@v5
        id: release-attempt-1
        continue-on-error: true
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Wait and retry on failure
        if: steps.release-attempt-1.outcome == 'failure'
        run: sleep 15

      - uses: googleapis/release-please-action@v5
        id: release-attempt-2
        if: steps.release-attempt-1.outcome == 'failure'
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set release outputs
        id: release
        run: |
          if [ "${{ steps.release-attempt-1.outcome }}" = "success" ]; then
            echo "release_created=${{ steps.release-attempt-1.outputs.release_created }}" >> $GITHUB_OUTPUT
            echo "tag_name=${{ steps.release-attempt-1.outputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "release_created=${{ steps.release-attempt-2.outputs.release_created }}" >> $GITHUB_OUTPUT
            echo "tag_name=${{ steps.release-attempt-2.outputs.tag_name }}" >> $GITHUB_OUTPUT
          fi
