name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  DOTNET_SDK_VERSION: "10.0.x"
  SOLUTION_PATH: Earmark.slnx
  PROJECT_PATH: src/Earmark.App/Earmark.App.csproj
  APPXMANIFEST_PATH: src/Earmark.App/Package.appxmanifest
  WIX_SOURCE_PATH: installer/Earmark.wxs
  BOM_FILE: sbom.cdx.json
  # NOTE: GitHub Actions does not allow expressions in `uses:` refs, so the
  # pipeline-tools pin is repeated in each `uses:` line below. Bump in lockstep.
  # Current pin: hoobio/pipeline-tools @ v2.2.1 (v2 split the Dependency-Track
  # channel input into channel + sub-channel; see the SBOM job below).

jobs:
  release-please:
    name: Release Please
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: hoobio/pipeline-tools/pipeline/github/step/release-please@v2.3.0
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          app-private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

  lint-and-test:
    name: Lint & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      # The .slnx file is minimal and doesn't define a Configuration|Platform matrix,
      # so MSBuild's generated metaproj rejects any -p:Configuration=...|Platform=...
      # combination. Restore/build/test the App and tests projects directly instead
      # (their references pull in Earmark.Core and Earmark.Audio transitively).
      - name: Restore
        run: |
          dotnet restore src/Earmark.App/Earmark.App.csproj -p:Platform=x64
          dotnet restore tests/Earmark.Core.Tests/Earmark.Core.Tests.csproj -p:Platform=x64

      - name: Build (TreatWarningsAsErrors)
        run: |
          dotnet build src/Earmark.App/Earmark.App.csproj -c Release -p:Platform=x64 --no-restore -p:TreatWarningsAsErrors=true
          dotnet build tests/Earmark.Core.Tests/Earmark.Core.Tests.csproj -c Release -p:Platform=x64 --no-restore

      - name: Test
        run: dotnet test tests/Earmark.Core.Tests/Earmark.Core.Tests.csproj -c Release -p:Platform=x64 --no-build

  build-msix:
    name: Build MSIX (${{ matrix.platform }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, ARM64]
    env:
      HAS_SIGNING_CERT: ${{ secrets.SIGNING_CERTIFICATE != '' && vars.SIGNING_CERT_THUMBPRINT != '' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content version.txt -Raw).Trim()
          "version=$ver" | Out-File -Append $env:GITHUB_OUTPUT
          "APP_VERSION=$ver" | Out-File -Append $env:GITHUB_ENV

      - name: Stamp Package.appxmanifest version
        uses: hoobio/pipeline-tools/pipeline/github/step/stamp-msix-version@v2.3.0
        with:
          manifest-path: ${{ env.APPXMANIFEST_PATH }}
          version: ${{ steps.version.outputs.version }}

      - name: Build MSIX
        uses: hoobio/pipeline-tools/pipeline/github/step/build-msix-dotnet@v2.3.0
        with:
          project-path: ${{ env.PROJECT_PATH }}
          platform: ${{ matrix.platform }}
          output-dir: ${{ github.workspace }}\AppPackages

      # `dotnet publish` lands the MSIX nested under
      # AppPackages\Earmark.App_<v>.<rev>_<plat>_Test\Earmark.App_<v>.<rev>_<plat>.msix.
      # Stage it to a flat directory under a consistent name so the signing step,
      # artifact upload, and release attachment all see a clean path.
      - name: Stage MSIX
        shell: pwsh
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ steps.version.outputs.version }}
          STAGE_DIR: ${{ github.workspace }}\staging\msix-${{ matrix.platform }}
        run: |
          $msix = Get-ChildItem -Path "${{ github.workspace }}\AppPackages" -Recurse -Filter *.msix -ErrorAction Stop |
            Where-Object { $_.FullName -notmatch '\\Dependencies\\' } |
            Select-Object -First 1
          if (-not $msix) { throw "No MSIX produced by dotnet publish" }
          New-Item -ItemType Directory -Path $env:STAGE_DIR -Force | Out-Null
          $dest = Join-Path $env:STAGE_DIR ("Earmark-{0}-{1}.msix" -f $env:VERSION, $env:PLATFORM)
          Copy-Item -LiteralPath $msix.FullName -Destination $dest -Force
          Write-Host "Staged MSIX: $dest"

      - name: Sign MSIX
        if: env.HAS_SIGNING_CERT == 'true'
        uses: hoobio/pipeline-tools/pipeline/github/step/sign-msix@v2.3.0
        with:
          pfx-base64: ${{ secrets.SIGNING_CERTIFICATE }}
          pfx-password: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          thumbprint: ${{ vars.SIGNING_CERT_THUMBPRINT }}
          packages-path: ${{ github.workspace }}\staging\msix-${{ matrix.platform }}

      - name: Skip-sign notice
        if: env.HAS_SIGNING_CERT != 'true'
        shell: bash
        run: echo "::warning::SIGNING_CERTIFICATE / SIGNING_CERT_THUMBPRINT not set; MSIX produced unsigned."

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: msix-${{ matrix.platform }}
          path: ${{ github.workspace }}\staging\msix-${{ matrix.platform }}\Earmark-${{ steps.version.outputs.version }}-${{ matrix.platform }}.msix
          if-no-files-found: error

  build-msi:
    name: Build MSI (${{ matrix.platform }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, ARM64]
    env:
      HAS_SIGNING_CERT: ${{ secrets.SIGNING_CERTIFICATE != '' && vars.SIGNING_CERT_THUMBPRINT != '' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content version.txt -Raw).Trim()
          "version=$ver" | Out-File -Append $env:GITHUB_OUTPUT
          "APP_VERSION=$ver" | Out-File -Append $env:GITHUB_ENV

      - name: Resolve runtime identifier
        id: rid
        shell: pwsh
        run: |
          $rid = if ($env:PLATFORM -eq 'ARM64') { 'win-arm64' } else { 'win-x64' }
          "rid=$rid" | Out-File -Append $env:GITHUB_OUTPUT
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Publish unpackaged self-contained build
        shell: pwsh
        env:
          PLATFORM: ${{ matrix.platform }}
          RID: ${{ steps.rid.outputs.rid }}
          PUBLISH_DIR: ${{ github.workspace }}\publish\${{ matrix.platform }}
        run: |
          New-Item -ItemType Directory -Path $env:PUBLISH_DIR -Force | Out-Null
          # Stamp the in-app build channel (read by Services/AppInfo for the About box / update UI).
          # The release-please PR build is the one the pre-release job publishes, so mark it
          # "Prerelease" and bake its full "<ver>-pre.<run>" identity into InformationalVersion so
          # the installed build can compare itself against newer pre-release tags. Everything else
          # CI builds is "Release".
          $channel = if ('${{ github.event_name }}' -eq 'pull_request' -and '${{ github.head_ref }}' -eq 'release-please--branches--main') { 'Prerelease' } else { 'Release' }
          $extra = @()
          if ($channel -eq 'Prerelease') {
            $extra += "-p:InformationalVersion=$($env:APP_VERSION)-pre.$($env:GITHUB_RUN_NUMBER)"
          }
          dotnet publish $env:PROJECT_PATH `
            -c Release `
            -p:Platform=$env:PLATFORM `
            -p:RuntimeIdentifier=$env:RID `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -p:SelfContained=true `
            -p:EarmarkBuildChannel=$channel `
            $extra `
            -o $env:PUBLISH_DIR
          if ($LASTEXITCODE -ne 0) { throw "dotnet publish failed (exit $LASTEXITCODE)" }
          if (-not (Test-Path "$env:PUBLISH_DIR\Earmark.App.exe")) {
            throw "Expected Earmark.App.exe in publish output"
          }

      - name: Build MSI
        uses: hoobio/pipeline-tools/pipeline/github/step/build-msi-wix@v2.3.0
        with:
          wix-source-path: ${{ env.WIX_SOURCE_PATH }}
          version: ${{ steps.version.outputs.version }}
          platform: ${{ matrix.platform }}
          payload-dir: ${{ github.workspace }}\publish\${{ matrix.platform }}
          output-dir: ${{ github.workspace }}\staging\msi-${{ matrix.platform }}
          # Pin extensions to 5.x; the unversioned form pulls the latest (currently
          # 7.0.0), which fails with "Could not find expected package root folder
          # wixext5. Ensure WixToolset.UI.wixext/7.0.0 is compatible with WiX v5."
          extensions: "WixToolset.UI.wixext/5.0.2,WixToolset.Util.wixext/5.0.2"

      - name: Sign MSI
        if: env.HAS_SIGNING_CERT == 'true'
        uses: hoobio/pipeline-tools/pipeline/github/step/sign-msi@v2.3.0
        with:
          pfx-base64: ${{ secrets.SIGNING_CERTIFICATE }}
          pfx-password: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          thumbprint: ${{ vars.SIGNING_CERT_THUMBPRINT }}
          packages-path: ${{ github.workspace }}\staging\msi-${{ matrix.platform }}

      - name: Skip-sign notice
        if: env.HAS_SIGNING_CERT != 'true'
        shell: bash
        run: echo "::warning::SIGNING_CERTIFICATE / SIGNING_CERT_THUMBPRINT not set; MSI produced unsigned."

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: msi-${{ matrix.platform }}
          path: ${{ github.workspace }}\staging\msi-${{ matrix.platform }}\Earmark-${{ steps.version.outputs.version }}-${{ matrix.platform }}.msi
          if-no-files-found: error

  wack:
    name: WACK (${{ matrix.platform }})
    needs: [build-msix]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, ARM64]
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/wack-exclusions.json
          sparse-checkout-cone-mode: false

      - name: Download MSIX
        uses: actions/download-artifact@v8
        with:
          name: msix-${{ matrix.platform }}
          path: msix

      - name: Run WACK
        uses: hoobio/pipeline-tools/pipeline/github/step/run-wack@v2.3.0
        with:
          msix-path: msix
          report-path: wack-report-${{ matrix.platform }}.xml
          exclusions-path: .github/wack-exclusions.json
          platform: ${{ matrix.platform }}
          fail-on-error: 'true'

      - name: Upload WACK report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wack-report-${{ matrix.platform }}
          path: wack-report-${{ matrix.platform }}.xml
          if-no-files-found: warn

  sbom:
    name: SBOM
    runs-on: windows-latest
    env:
      DT_HOST: ${{ secrets.DT_HOST }}
      DT_API_KEY: ${{ secrets.DT_API_KEY }}
      DT_DOMAIN: audio
      DT_SYSTEM: earmark
      DT_COMPONENT: earmark-app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      # Channel routing for the Backstage hierarchy in Dependency-Track. v2 of
      # pipeline-tools takes channel + sub-channel as two separate inputs (the
      # old single `ci/<branch>` string is a v1 shape that the bootstrap now
      # treats as a legacy and migrates out from under us).
      #   release event           -> channel=release,        sub-channel='',         mark-latest=true,  no prune
      #   push to default branch  -> channel=main,           sub-channel='',         mark-latest=false, prune
      #   push to feature / PR    -> channel=ci,             sub-channel=<branch>,   mark-latest=false, prune
      - name: Resolve DT channel
        id: dt
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref }}
          SHA: ${{ github.sha }}
          DEFAULT_BRANCH: main
        run: |
          if ($env:EVENT_NAME -eq 'release') {
            $channel = 'release'
            $subChannel = ''
            $projectVersion = $env:REF_NAME
            $markLatest = 'true'
            $prune = 'false'
          }
          else {
            $branchSource = if ($env:EVENT_NAME -eq 'pull_request') { $env:HEAD_REF } else { $env:REF_NAME }
            $sanitized = ($branchSource -replace '[^A-Za-z0-9._/-]', '-')
            if ($sanitized -eq $env:DEFAULT_BRANCH) {
              # Default branch sits at top-level alongside release, not nested under ci.
              $channel = $sanitized
              $subChannel = ''
            }
            else {
              $channel = 'ci'
              $subChannel = $sanitized
            }
            $projectVersion = $env:SHA
            $markLatest = 'false'
            $prune = 'true'
          }

          # Effective parent name used by the upload step. Used for the tag value
          # so DT filters match the new v2 hierarchy.
          $effectiveChannel = if ($subChannel) { $subChannel } else { $channel }

          "channel=$channel"                  | Out-File -Append $env:GITHUB_OUTPUT
          "sub_channel=$subChannel"           | Out-File -Append $env:GITHUB_OUTPUT
          "effective_channel=$effectiveChannel" | Out-File -Append $env:GITHUB_OUTPUT
          "project_version=$projectVersion"   | Out-File -Append $env:GITHUB_OUTPUT
          "mark_latest=$markLatest"           | Out-File -Append $env:GITHUB_OUTPUT
          "prune=$prune"                      | Out-File -Append $env:GITHUB_OUTPUT
          Write-Host "Channel:           $channel"
          Write-Host "SubChannel:        $subChannel"
          Write-Host "EffectiveChannel:  $effectiveChannel"
          Write-Host "ProjectVersion:    $projectVersion"
          Write-Host "MarkLatest:        $markLatest"
          Write-Host "Prune:             $prune"

      - name: Generate CycloneDX SBOM
        uses: hoobio/pipeline-tools/pipeline/github/step/cyclonedx-sbom-dotnet@v2.3.0
        with:
          solution-path: ${{ env.SOLUTION_PATH }}
          output-path: ${{ env.BOM_FILE }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: ${{ env.BOM_FILE }}
          if-no-files-found: error

      - name: Upload SBOM to Dependency-Track
        if: env.DT_HOST != '' && env.DT_API_KEY != ''
        uses: hoobio/pipeline-tools/pipeline/github/job/upload-sbom-to-dependency-track@v2.3.0
        with:
          bom-path: ${{ env.BOM_FILE }}
          upload-artifact: 'false'
          server-url: https://${{ env.DT_HOST }}
          api-key: ${{ env.DT_API_KEY }}
          domain: ${{ env.DT_DOMAIN }}
          system: ${{ env.DT_SYSTEM }}
          component: ${{ env.DT_COMPONENT }}
          channel: ${{ steps.dt.outputs.channel }}
          sub-channel: ${{ steps.dt.outputs.sub_channel }}
          default-branch: main
          project-version: ${{ steps.dt.outputs.project_version }}
          project-tags: channel=${{ steps.dt.outputs.effective_channel }},repo=${{ github.repository }},commit=${{ github.sha }},run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          mark-latest: ${{ steps.dt.outputs.mark_latest }}
          prune-stale-children: ${{ steps.dt.outputs.prune }}
          keep: ${{ github.event_name == 'workflow_dispatch' && '1' || '10' }}

      - name: Skip notice if Dependency-Track secrets not configured
        if: env.DT_HOST == '' || env.DT_API_KEY == ''
        shell: bash
        run: echo "::warning::DT_HOST or DT_API_KEY secret not set; skipping Dependency-Track upload."

  release:
    name: Publish Release
    needs: [release-please, lint-and-test, build-msix, build-msi, wack, sbom]
    if: >-
      always()
      && needs.release-please.outputs.release_created == 'true'
      && needs.lint-and-test.result == 'success'
      && needs.build-msix.result == 'success'
      && needs.build-msi.result == 'success'
      && needs.wack.result == 'success'
      && needs.sbom.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      # Download every artefact into a single tree under `release/`. Each
      # artefact's contents already sit at the root of its own folder (the
      # build/wack/sbom jobs stage to flat dirs first), so the attach step can
      # just glob across `release/**` for raw files.
      - name: Download MSIX (x64)
        uses: actions/download-artifact@v8
        with:
          name: msix-x64
          path: release/msix-x64
      - name: Download MSIX (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: msix-ARM64
          path: release/msix-ARM64
      - name: Download MSI (x64)
        uses: actions/download-artifact@v8
        with:
          name: msi-x64
          path: release/msi-x64
      - name: Download MSI (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: msi-ARM64
          path: release/msi-ARM64
      - name: Download SBOM
        uses: actions/download-artifact@v8
        with:
          name: sbom
          path: release/sbom
      - name: Download WACK report (x64)
        uses: actions/download-artifact@v8
        with:
          name: wack-report-x64
          path: release/wack-x64
      - name: Download WACK report (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: wack-report-ARM64
          path: release/wack-ARM64

      - name: Attest installer provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "release/msix-*/*.msix,release/msi-*/*.msi"

      - name: Attach all artefacts to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          mapfile -t RELEASE_FILES < <(find release -type f \( \
            -name '*.msix' -o \
            -name '*.msi'  -o \
            -name '*.cdx.json' -o \
            -name 'wack-report-*.xml' \))
          if [ "${#RELEASE_FILES[@]}" -eq 0 ]; then
            echo "::error::No release files found to attach"
            exit 1
          fi
          printf 'Attaching: %s\n' "${RELEASE_FILES[@]}"
          gh release upload "$TAG" "${RELEASE_FILES[@]}" --clobber --repo "${{ github.repository }}"

      - name: Publish draft release
        uses: hoobio/pipeline-tools/pipeline/github/step/publish-github-release@v2.3.0
        with:
          tag: ${{ needs.release-please.outputs.tag_name }}
          github-token: ${{ github.token }}

  pre-release:
    name: Pre-Release
    # Runs on the release-please PR (which already carries the bumped version.txt + changelog),
    # turning each push to that PR into an installable pre-release so the bumped build can be
    # smoke-tested before the release PR merges. The in-app update check ignores these (it only
    # compares against releases/latest, which excludes prereleases).
    needs: [build-msix, build-msi, lint-and-test]
    if: >-
      always()
      && github.event_name == 'pull_request'
      && github.head_ref == 'release-please--branches--main'
      && needs.build-msix.result == 'success'
      && needs.build-msi.result == 'success'
      && needs.lint-and-test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Generate release notes
        run: |
          VERSION_PREFIX="v${{ steps.version.outputs.version }}-pre."
          # Diff against the most recent pre-release for this version, else the last stable tag.
          PREV_TAG=$(git tag --sort=-version:refname | grep -m1 "^${VERSION_PREFIX}" || true)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git tag --sort=-version:refname | grep -m1 '^v[0-9]' || true)
          fi
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "$NOTES" > /tmp/release_notes.txt

      - name: Download MSIX (x64)
        uses: actions/download-artifact@v8
        with:
          name: msix-x64
          path: release/msix-x64
      - name: Download MSIX (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: msix-ARM64
          path: release/msix-ARM64
      - name: Download MSI (x64)
        uses: actions/download-artifact@v8
        with:
          name: msi-x64
          path: release/msi-x64
      - name: Download MSI (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: msi-ARM64
          path: release/msi-ARM64

      # Create as a draft first so the asset upload completes even on repos with immutable
      # releases, then flip to a published prerelease.
      - name: Create pre-release (draft)
        # Pinned to a commit SHA (third-party action). Bump via Dependabot/Renovate.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: v${{ steps.version.outputs.version }}-pre.${{ github.run_number }}
          name: v${{ steps.version.outputs.version }}-pre.${{ github.run_number }}
          prerelease: true
          draft: true
          make_latest: false
          body_path: /tmp/release_notes.txt
          files: |
            release/**/*.msix
            release/**/*.msi

      - name: Publish pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ steps.version.outputs.version }}-pre.${{ github.run_number }}
        run: gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false --prerelease

      - name: Prune old pre-releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: 3
        run: |
          VERSION_PREFIX="v${{ steps.version.outputs.version }}-pre."
          RELEASES=$(gh release list \
            --repo ${{ github.repository }} \
            --limit 100 \
            --json tagName,isPrerelease \
            --jq "[.[] | select(.isPrerelease == true and (.tagName | startswith(\"$VERSION_PREFIX\")))] | sort_by(.tagName) | reverse | .[${KEEP}:] | .[].tagName")
          for TAG in $RELEASES; do
            echo "Deleting old pre-release: $TAG"
            gh release delete "$TAG" --repo ${{ github.repository }} --yes --cleanup-tag
          done
