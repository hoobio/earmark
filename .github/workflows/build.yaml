name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  DOTNET_SDK_VERSION: "10.0.x"
  SOLUTION_PATH: Earmark.slnx
  PROJECT_PATH: src/Earmark.App/Earmark.App.csproj
  APPXMANIFEST_PATH: src/Earmark.App/Package.appxmanifest
  BOM_FILE: sbom.cdx.json
  # NOTE: GitHub Actions does not allow expressions in `uses:` refs, so the
  # pipeline-tools pin is repeated in each `uses:` line below. Bump in lockstep.
  # Current pin: hoobio/pipeline-tools @ v1.1.0 (immutable release).

jobs:
  release-please:
    name: Release Please
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: hoobio/pipeline-tools/pipeline/github/step/release-please@v1.1.0
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          app-private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

  lint-and-test:
    name: Lint & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      # The .slnx file is minimal and doesn't define a Configuration|Platform matrix,
      # so MSBuild's generated metaproj rejects any -p:Configuration=...|Platform=...
      # combination. Restore/build/test the App and tests projects directly instead
      # (their references pull in Earmark.Core and Earmark.Audio transitively).
      - name: Restore
        run: |
          dotnet restore src/Earmark.App/Earmark.App.csproj -p:Platform=x64
          dotnet restore tests/Earmark.Core.Tests/Earmark.Core.Tests.csproj -p:Platform=x64

      - name: Build (TreatWarningsAsErrors)
        run: |
          dotnet build src/Earmark.App/Earmark.App.csproj -c Release -p:Platform=x64 --no-restore -p:TreatWarningsAsErrors=true
          dotnet build tests/Earmark.Core.Tests/Earmark.Core.Tests.csproj -c Release -p:Platform=x64 --no-restore

      - name: Test
        run: dotnet test tests/Earmark.Core.Tests/Earmark.Core.Tests.csproj -c Release -p:Platform=x64 --no-build

  build-msix:
    name: Build MSIX (${{ matrix.platform }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, ARM64]
    env:
      HAS_SIGNING_CERT: ${{ secrets.SIGNING_CERTIFICATE != '' && vars.SIGNING_CERT_THUMBPRINT != '' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content version.txt -Raw).Trim()
          "version=$ver" | Out-File -Append $env:GITHUB_OUTPUT
          "APP_VERSION=$ver" | Out-File -Append $env:GITHUB_ENV

      - name: Stamp Package.appxmanifest version
        uses: hoobio/pipeline-tools/pipeline/github/step/stamp-msix-version@v1.1.0
        with:
          manifest-path: ${{ env.APPXMANIFEST_PATH }}
          version: ${{ steps.version.outputs.version }}

      - name: Build MSIX
        uses: hoobio/pipeline-tools/pipeline/github/step/build-msix-dotnet@v1.1.0
        with:
          project-path: ${{ env.PROJECT_PATH }}
          platform: ${{ matrix.platform }}
          output-dir: ${{ github.workspace }}\AppPackages

      - name: Sign MSIX
        if: env.HAS_SIGNING_CERT == 'true'
        uses: hoobio/pipeline-tools/pipeline/github/step/sign-msix@v1.1.0
        with:
          pfx-base64: ${{ secrets.SIGNING_CERTIFICATE }}
          pfx-password: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          thumbprint: ${{ vars.SIGNING_CERT_THUMBPRINT }}
          packages-path: ${{ github.workspace }}\AppPackages

      - name: Skip-sign notice
        if: env.HAS_SIGNING_CERT != 'true'
        shell: bash
        run: echo "::warning::SIGNING_CERTIFICATE / SIGNING_CERT_THUMBPRINT not set; MSIX produced unsigned."

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: msix-${{ matrix.platform }}
          path: ${{ github.workspace }}\AppPackages\**\*.msix
          if-no-files-found: error

  wack:
    name: WACK (${{ matrix.platform }})
    needs: [build-msix]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, ARM64]
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/wack-exclusions.json
          sparse-checkout-cone-mode: false

      - name: Download MSIX
        uses: actions/download-artifact@v8
        with:
          name: msix-${{ matrix.platform }}
          path: msix

      - name: Run WACK
        uses: hoobio/pipeline-tools/pipeline/github/step/run-wack@8704a6276998a90569ba75c5b793e4e68288bea5
        with:
          msix-path: msix
          report-path: wack-report-${{ matrix.platform }}.xml
          exclusions-path: .github/wack-exclusions.json
          platform: ${{ matrix.platform }}
          fail-on-error: 'true'

      - name: Upload WACK report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wack-report-${{ matrix.platform }}
          path: wack-report-${{ matrix.platform }}.xml
          if-no-files-found: warn

  sbom:
    name: SBOM
    runs-on: windows-latest
    env:
      DT_HOST: ${{ secrets.DT_HOST }}
      DT_API_KEY: ${{ secrets.DT_API_KEY }}
      IS_RELEASE: ${{ github.event_name == 'release' }}
      REF_TAG_PREFIX: ${{ github.event_name == 'release' && 'tag' || 'branch' }}
      PROJECT_VERSION: ${{ github.event_name == 'release' && github.ref_name || github.sha }}
      PARENT_VERSION: ${{ github.event_name == 'release' && 'release' || 'main' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Generate CycloneDX SBOM
        uses: hoobio/pipeline-tools/pipeline/github/step/cyclonedx-sbom-dotnet@v1.1.0
        with:
          solution-path: ${{ env.SOLUTION_PATH }}
          output-path: ${{ env.BOM_FILE }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: ${{ env.BOM_FILE }}
          if-no-files-found: error

      - name: Upload SBOM to Dependency-Track
        if: env.DT_HOST != '' && env.DT_API_KEY != ''
        uses: hoobio/pipeline-tools/pipeline/github/job/upload-sbom-to-dependency-track@v1.1.0
        with:
          bom-path: ${{ env.BOM_FILE }}
          upload-artifact: 'false'
          server-url: https://${{ env.DT_HOST }}
          api-key: ${{ env.DT_API_KEY }}
          project-name: ${{ github.event.repository.name }}
          project-version: ${{ env.PROJECT_VERSION }}
          project-tags: ${{ env.REF_TAG_PREFIX }}=${{ github.ref_name }},repo=${{ github.repository }},commit=${{ github.sha }},run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          parent-name: ${{ github.event.repository.name }}
          parent-version: ${{ env.PARENT_VERSION }}
          mark-latest: ${{ env.IS_RELEASE }}
          prune-stale-children: ${{ env.IS_RELEASE != 'true' }}
          keep: ${{ github.event_name == 'workflow_dispatch' && '1' || '10' }}

      - name: Skip notice if Dependency-Track secrets not configured
        if: env.DT_HOST == '' || env.DT_API_KEY == ''
        shell: bash
        run: echo "::warning::DT_HOST or DT_API_KEY secret not set; skipping Dependency-Track upload."

  release:
    name: Publish Release
    needs: [release-please, lint-and-test, build-msix, wack, sbom]
    if: >-
      always()
      && needs.release-please.outputs.release_created == 'true'
      && needs.lint-and-test.result == 'success'
      && needs.build-msix.result == 'success'
      && needs.wack.result == 'success'
      && needs.sbom.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - name: Download MSIX (x64)
        uses: actions/download-artifact@v8
        with:
          name: msix-x64
          path: release/msix-x64
      - name: Download MSIX (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: msix-ARM64
          path: release/msix-ARM64
      - name: Download SBOM
        uses: actions/download-artifact@v8
        with:
          name: sbom
          path: release/sbom

      - name: Attest MSIX provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "release/msix-*/**/*.msix"

      - name: Attach SBOM to draft release
        uses: hoobio/pipeline-tools/pipeline/github/step/upload-to-github-release@v1.1.0
        with:
          tag: ${{ needs.release-please.outputs.tag_name }}
          file-path: release/sbom/${{ env.BOM_FILE }}
          github-token: ${{ github.token }}

      - name: Attach MSIX packages to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          mapfile -t MSIX_FILES < <(find release/msix-x64 release/msix-ARM64 -type f -name '*.msix')
          gh release upload "$TAG" "${MSIX_FILES[@]}" --clobber --repo "${{ github.repository }}"

      - name: Publish draft release
        uses: hoobio/pipeline-tools/pipeline/github/step/publish-github-release@v1.1.0
        with:
          tag: ${{ needs.release-please.outputs.tag_name }}
          github-token: ${{ github.token }}
