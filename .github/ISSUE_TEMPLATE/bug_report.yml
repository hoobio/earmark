name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Open Earmark
        2. Add a rule with '...'
        3. See unexpected routing
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows Version
      description: "Run `winver` to find this."
      placeholder: "e.g. Windows 11 24H2 (Build 26100.3476)"
    validations:
      required: true

  - type: input
    id: earmark
    attributes:
      label: Earmark Version
      description: "Found in Settings > About, or Apps & Features. Match `version.txt` if you built from source."
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: dropdown
    id: install-source
    attributes:
      label: Installation Source
      options:
        - GitHub Release (MSI)
        - Built from source
        - Other
    validations:
      required: true

  - type: textarea
    id: devices
    attributes:
      label: Audio Devices
      description: |
        Briefly describe your audio setup if relevant: virtual cables (e.g. VoiceMeeter, Elgato Wave Link), USB DACs, headsets, etc. Helps narrow down whether the issue is specific to a class of device.
    validations:
      required: false

  - type: textarea
    id: log
    attributes:
      label: Log Snippet
      description: |
        Paste the last 50-100 lines from `%LocalAppData%\Earmark\logs\earmark-*.log` (the latest file). PowerShell:
        `Get-ChildItem "$env:LocalAppData\Earmark\logs\*.log" | Sort-Object LastWriteTime -Descending | Select-Object -First 1 | Get-Content -Tail 100`
      render: shell
    validations:
      required: false

  - type: textarea
    id: rule
    attributes:
      label: Rule (if relevant)
      description: |
        Paste the offending rule from `%UserProfile%\Documents\Hoobi\Earmark\rules.json`, or describe the regex patterns you used. Redact anything you're not comfortable sharing.
      render: json
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots of the Rules page or Sessions page.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched [existing issues](https://github.com/hoobio/earmark/issues) and this hasn't been reported yet
          required: true
        - label: I'm using the latest release of Earmark
          required: false
